<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link href="/static/css/style.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/static/images/ATVI-logo.png" />
  </head>
  <body class="dashboard-page">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <img
          src="/static/images/ATVI-logo-wb.png"
          class="img-logo"
          alt="Agritech brand logo"
          style="width: 40px; height: 40px; border-radius: 5px"
        />
        <h2>AgriTech</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item">
          <img
            src="/static/images/dashboard.png"
            style="width: 30px; height: 30px"
          />
          Dashboard
        </a>
        <a href="/crops-page" class="nav-item">
          <img
            src="/static/images/crops.png"
            style="width: 30px; height: 30px"
          />
          My Crops
        </a>
        <a href="/expenses-page" class="nav-item active">
          <img
            src="/static/images/expenses.png"
            style="width: 30px; height: 30px"
          />
          Expenses
        </a>
        <a href="/reports-page" class="nav-item">
          <img
            src="/static/images/report.png"
            style="width: 30px; height: 30px"
          />
          Reports
        </a>
        <a href="/profile-page" class="nav-item">
          <img
            src="/static/images/profile.png"
            style="width: 30px; height: 30px"
          />
          Profile
        </a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn-logout">Sign Out</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-greeting">
          <h1>
            <img
              src="/static/images/expenses.png"
              style="width: 40px; height: 40px"
            />
            My Expenses
          </h1>
          <p>Manage your crops and record expenses</p>
        </div>
        <button class="btn-add" id="add-expense-btn">+ Add Expense</button>
      </div>

      <div class="section">
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Crop</th>
                <th>Expense Item</th>
                <th>Amount</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="expense-tbody">
              <tr>
                <td colspan="9" class="loading">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ADD EXPENSE MODAL -->
      <div class="modal hidden" id="add-expense-modal">
        <div class="modal-box">
          <h2>Add New Expense</h2>
          <div class="form-group">
            <select id="expense-crop-id" class="dropdown">
              <option value="">Select a crop...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Expense Item *</label>
            <input
              type="text"
              id="expense-item"
              placeholder="e.g. Fertilizer, Labour, Irrigation"
            />
          </div>
          <div class="form-group">
            <label>Amount (TZS) *</label>
            <input type="number" id="expense-amount" placeholder="e.g. 10000" />
          </div>
          <div class="error-message hidden" id="expense-modal-error"></div>
          <div class="modal-actions">
            <button id="cancel-expense-btn" class="btn-secondary">
              Cancel
            </button>
            <button id="save-expense-btn" class="btn-primary">
              Save Expense
            </button>
          </div>
        </div>
      </div>
      <!-- DELETE EXPENSE MODAL -->
      <div id="delete-expense-modal" class="modal hidden">
        <div class="modal-box-sm">
          <h2>Delete Expense</h2>
          <p style="color: #718096; margin-bottom: 24px">
            Are you sure you want to delete this expense? This cannot be undone.
          </p>
          <input type="hidden" id="delete-expense-id" />
          <div class="modal-actions">
            <button id="cancel-delete-expense-btn" class="btn-secondary">
              Cancel
            </button>
            <button
              id="confirm-delete-expense-btn"
              class="btn-primary"
              style="background: #c53030"
            >
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/expenses.js"></script>
  </body>
</html>
